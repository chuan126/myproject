extends:
  - ../_base_paper_9seq.yml

experiment:
  name: paper/table1_baselines/m2_informer_uitf

data:
  feature_columns:
    - voltage
    - current
    - temperature
    - force

model:
  name: informer
  hidden_size: 64
  num_layers: 2
  n_heads: 4
  d_ff: 128
  factor: 5
  attention: prob
  distil: false
  activation: gelu
  dropout: 0.1
  pooling:
    name: last
  head:
    name: regression
    hidden_size: null
    dropout: 0.0
