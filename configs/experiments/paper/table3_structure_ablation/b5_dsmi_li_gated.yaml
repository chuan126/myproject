extends:
  - ../_base_paper_9seq.yml

experiment:
  name: paper/table3_structure_ablation/b5_dsmi_li_gated

data:
  feature_columns:
    - voltage
    - current
    - temperature
    - force
    - delta_f
    - delta_q
    - df_dt
    - df_dq
    - force_slope

model:
  architecture:
    name: dual_stream
  feature_columns:
    - voltage
    - current
    - temperature
    - force
    - delta_f
    - delta_q
    - df_dt
    - df_dq
    - force_slope
  main_branch:
    feature_columns:
      - voltage
      - current
      - temperature
      - force
    encoder:
      name: lstm
      hidden_size: 64
      num_layers: 2
      dropout: 0.0
    pooling:
      name: last
  mech_branch:
    feature_columns:
      - delta_f
      - delta_q
      - df_dt
      - df_dq
      - force_slope
    encoder:
      name: informer
      hidden_size: 64
      num_layers: 2
      n_heads: 4
      d_ff: 128
      factor: 5
      attention: prob
      distil: false
      activation: gelu
      dropout: 0.1
    pooling:
      name: last
  fusion:
    name: gated
  head:
    name: regression
    hidden_size: null
    dropout: 0.0
